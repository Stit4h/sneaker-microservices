services:
  postgres:
    image: postgres:15
    container_name: micro_postgres
    environment:
      POSTGRES_DB: sneaker_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sneaker_network

  auth-service:
    build: ./auth-service
    container_name: auth_service
    ports:
      - "8001:8001"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=sneaker_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - SECRET_KEY=shared-secret-key-for-all-services-2024
    volumes:
      - ./auth-service:/app
      - ./shared/static:/app/staticfiles
      - ./shared/static:/app/static
      - ./shared/media:/app/media
      - ./shared/templates:/app/templates
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sneaker_network

  catalog-service:
    build: ./catalog-service
    container_name: catalog_service
    ports:
      - "8002:8002"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=sneaker_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - SECRET_KEY=shared-secret-key-for-all-services-2024
    volumes:
      - ./shared/static:/app/staticfiles
      - ./shared/media:/app/media
      - ./shared/templates:/app/templates
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sneaker_network

  order-service:
    build: ./order-service
    container_name: order_service
    ports:
      - "8003:8003"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=sneaker_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - SECRET_KEY=shared-secret-key-for-all-services-2024
    volumes:
      - ./shared/static:/app/staticfiles
      - ./shared/media:/app/media
      - ./shared/templates:/app/templates
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sneaker_network

  telegram-service:
    build: ./telegram-service
    container_name: telegram_service
    ports:
      - "8004:8004"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=sneaker_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - SECRET_KEY=shared-secret-key-for-all-services-2024
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - ./shared/static:/app/staticfiles
      - ./shared/media:/app/media
      - ./shared/templates:/app/templates
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sneaker_network

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./shared/static:/static
      - ./shared/media:/media
    depends_on:
      - auth-service
      - catalog-service
      - order-service
      - telegram-service
    networks:
      - sneaker_network

networks:
  sneaker_network:
    driver: bridge

volumes:
  postgres_data:

